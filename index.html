<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionCo Studio</title>
    <style>
        /* 1. Basic Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%; width: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* 2. Full Screen Video */
        .video-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* 3. Overlay UI */
        .interface {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: #f15c22; /* Your brand orange */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.1); /* Subtle dark tint */
        }

        .logo img {
            width: 180px;
            height: auto;
        }

        /* 4. Play Button */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #playToggle {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #f15c22;
            color: #f15c22;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #playToggle:hover {
            background: #f15c22;
            color: #000;
        }

        /* 5. Footer Links */
        .footer {
            display: flex;
            gap: 30px;
            font-size: 0.8rem;
        }

        .footer a {
            color: #f15c22;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .footer a:hover {
            opacity: 0.6;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .interface { padding: 20px; }
            .footer { gap: 40px; justify-content: center; width: 100%; }
            #playToggle { padding: 20px 40px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="myVideo" autoplay loop muted playsinline>
            <source src="mocoreel_v3.mp4" type="video/mp4">
        </video>
    </div>

    <div class="interface">
        <div class="logo">
            <img src="moco_logo_red.png" alt="MotionCo">
        </div>

        <div class="controls">
            <button id="playToggle">Enable Audio</button>
        </div>

        <div class="footer">
            <a href="mailto:motioncosutdio@gmail.com">Email</a>
            <a href="https://instagram.com/wearemotionco" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const btn = document.getElementById('playToggle');

        btn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                btn.innerHTML = "Mute";
            } else {
                if (video.paused) {
                    video.play();
                    btn.innerHTML = "Pause";
                } else {
                    video.pause();
                    btn.innerHTML = "Play";
                }
            }
        });
    </script>

</body>
</html>
