<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionCo</title>
    <style>
        /* 1. Basic Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            width: 100%;
            background-color: #000; /* Matches video black points */
            overflow: hidden; /* Prevents scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Full Screen Video Styling */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Crops slightly to ensure full bleed */
        }

        /* 3. Branding Overlay (Optional - Remove if you want pure video) */
        .overlay {
            position: relative;
            z-index: 10;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
            pointer-events: none; /* Allows clicking "through" the text */
            opacity: 0.8;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- 
             autoplay: starts immediately
             muted: required for autoplay to work in browsers
             loop: keeps it running
             playsinline: vital for mobile support
             (No 'controls' attribute means no timeline or play button)
        -->
        <video autoplay muted loop playsinline id="hero-video">
            <source src="mocoreel_v3.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Optional: Subtle text overlay -->
    <div class="overlay">
        <h1>MotionCo</h1>
    </div>

</body>
</html>
