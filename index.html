<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionCo Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%; width: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Full Screen Video */
        .video-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        video {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Overlay UI */
        .interface {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: white;
            background: rgba(0,0,0,0.2); /* Subtle dim to make text pop */
        }

        /* Top: Branding/Logo */
        .logo img {
            width: 180px;
            height: auto;
        }

        /* Center: Play/Toggle Button */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #playToggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.7rem;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #playToggle:hover {
            background: white;
            color: black;
        }

        /* Bottom: Contacts */
        .footer {
            display: flex;
            gap: 30px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer a {
            color: white;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .footer a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Starts muted to allow autoplay -->
        <video id="myVideo" autoplay loop muted playsinline>
            <source src="mocoreel_v3.mp4" type="video/mp4">
        </video>
    </div>

    <div class="interface">
        <div class="logo">
            <img src="moco_logo_red.png" alt="MotionCo">
        </div>

        <div class="controls">
            <button id="playToggle">Enable Audio / Play</button>
        </div>

        <div class="footer">
            <a href="mailto:motioncostudio@gmail.com">Email</a>
            <a href="https://instagram.com/motionco" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const btn = document.getElementById('playToggle');

        btn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                btn.innerHTML = "Mute";
            } else {
                if (video.paused) {
                    video.play();
                    btn.innerHTML = "Pause";
                } else {
                    video.pause();
                    btn.innerHTML = "Play";
                }
            }
        });
    </script>

</body>
</html>
