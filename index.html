<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotionCo</title>
    <style>
        /* 1. Basic Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            width: 100%;
            background-color: #000; /* Matches video black points */
            overflow: hidden; /* Prevents scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Full Screen Video Styling */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Keeps video behind the logo */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            /* Ensures video fills the screen and covers edge-to-edge */
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Crops slightly to ensure full bleed */
        }

        /* 3. Logo Overlay */
        .logo-container {
            position: relative;
            z-index: 10; /* Keeps logo in front of the video */
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Allows user to click "through" the logo */
            width: 100%;
            height: 100%;
        }

        .studio-logo {
            /* Control Logo Size here */
            width: 300px; /* Adjust to your preferred fixed size */
            max-width: 60%; /* Prevents logo from overflowing on mobile screens */
            height: auto;
            opacity: 0.9; /* Slight transparency to feel integrated */
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5)); /* Adds subtle depth and separation from video */
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay muted loop playsinline id="hero-video">
            <source src="mocoreel_v3.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="logo-container">
        <img src="MOCO_Logo_v3.2.png" alt="MotionCo" class="studio-logo">
    </div>

</body>
</html>
